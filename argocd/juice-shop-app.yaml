apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: juice-shop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/NikodemHeitzman/k8s-devsecops-portfolio'
    targetRevision: master
    path: apps/juice-shop
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: juice-shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true